<!-- 
SharePoint Inline Widget
────────────────────────
Copy this ENTIRE file and paste it into SharePoint's "Embed" web part.
Works on Modern pages without external hosting.

IMPORTANT: Update the API_BASE_URL on line 243 with your ngrok URL!
-->

<div id="sp-ai-chat-root"></div>

<script>
(function() {
    'use strict';
    
    // ═════════════════════════════════════════════════════════
    // CONFIGURATION — Update this with your ngrok URL
    // ═════════════════════════════════════════════════════════
    
    const API_BASE_URL = 'https://unworshiping-gantleted-amaya.ngrok-free.dev';  // CHANGE THIS
    
    // ═════════════════════════════════════════════════════════
    
    const rootEl = document.getElementById('sp-ai-chat-root');
    
    // Inject styles
    const style = document.createElement('style');
    style.textContent = `
        #sp-ai-chat-root * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .spai-container {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 600px;
            max-width: 900px;
            margin: 20px auto;
        }

        .spai-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .spai-header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .spai-clear-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .spai-clear-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .spai-examples {
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid #e5e7eb;
        }

        .spai-example-chip {
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: #4b5563;
        }

        .spai-example-chip:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .spai-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .spai-message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: spaiSlideIn 0.3s ease;
        }

        @keyframes spaiSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spai-message.spai-user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .spai-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 600;
            font-size: 14px;
        }

        .spai-message.spai-user .spai-avatar {
            background: #667eea;
            color: white;
        }

        .spai-message.spai-assistant .spai-avatar {
            background: #e0e7ff;
            color: #667eea;
        }

        .spai-content {
            background: #f3f4f6;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .spai-message.spai-user .spai-content {
            background: #667eea;
            color: white;
        }

        .spai-typing {
            display: none;
            gap: 4px;
            padding: 12px 16px;
            background: #f3f4f6;
            border-radius: 12px;
            width: fit-content;
        }

        .spai-typing.spai-show {
            display: flex;
        }

        .spai-typing-dot {
            width: 8px;
            height: 8px;
            background: #9ca3af;
            border-radius: 50%;
            animation: spaiTyping 1.4s infinite;
        }

        .spai-typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .spai-typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes spaiTyping {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .spai-input-area {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            background: white;
            border-radius: 0 0 12px 12px;
        }

        .spai-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .spai-input {
            flex: 1;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            max-height: 120px;
        }

        .spai-input:focus {
            border-color: #667eea;
        }

        .spai-send-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .spai-send-btn:hover:not(:disabled) {
            background: #5568d3;
        }

        .spai-send-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .spai-error {
            background: #fee;
            color: #c00;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 10px 20px;
            display: none;
        }

        .spai-error.spai-show {
            display: block;
        }
    `;
    document.head.appendChild(style);
    
    // Build UI
    rootEl.innerHTML = `
        <div class="spai-container">
            <div class="spai-header">
                <h1>📁 SharePoint AI Assistant</h1>
                <button class="spai-clear-btn" onclick="window.spaiClearConversation()">New Chat</button>
            </div>
            
            <div id="spai-examples" class="spai-examples">
                <div class="spai-example-chip" onclick="window.spaiSendExample(this)">Find holiday policy documents</div>
                <div class="spai-example-chip" onclick="window.spaiSendExample(this)">Show files in HR folder</div>
                <div class="spai-example-chip" onclick="window.spaiSendExample(this)">Read the employee handbook</div>
                <div class="spai-example-chip" onclick="window.spaiSendExample(this)">Search for quarterly reports</div>
            </div>
            
            <div id="spai-error" class="spai-error"></div>
            
            <div id="spai-messages" class="spai-messages">
                <div class="spai-message spai-assistant">
                    <div class="spai-avatar">AI</div>
                    <div class="spai-content">Hello! I can help you search, browse, and read files in SharePoint. What would you like to find?</div>
                </div>
            </div>
            
            <div class="spai-input-area">
                <div class="spai-input-wrapper">
                    <textarea 
                        id="spai-input" 
                        class="spai-input" 
                        placeholder="Ask me about SharePoint files..."
                        rows="1"
                    ></textarea>
                    <button id="spai-send-btn" class="spai-send-btn" onclick="window.spaiSendMessage()">Send</button>
                </div>
            </div>
        </div>
    `;
    
    // State
    let conversationId = null;
    let isProcessing = false;
    
    const messagesEl = document.getElementById('spai-messages');
    const inputEl = document.getElementById('spai-input');
    const sendBtn = document.getElementById('spai-send-btn');
    const errorEl = document.getElementById('spai-error');
    const examplesEl = document.getElementById('spai-examples');
    
    // Auto-resize textarea
    inputEl.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    
    // Enter to send
    inputEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            window.spaiSendMessage();
        }
    });
    
    // Global functions
    window.spaiSendExample = function(el) {
        inputEl.value = el.textContent;
        window.spaiSendMessage();
    };
    
    window.spaiShowError = function(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('spai-show');
        setTimeout(() => errorEl.classList.remove('spai-show'), 5000);
    };
    
    window.spaiAddMessage = function(content, isUser) {
        const msg = document.createElement('div');
        msg.className = `spai-message ${isUser ? 'spai-user' : 'spai-assistant'}`;
        msg.innerHTML = `
            <div class="spai-avatar">${isUser ? 'You' : 'AI'}</div>
            <div class="spai-content">${content}</div>
        `;
        messagesEl.appendChild(msg);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        
        if (examplesEl && messagesEl.children.length > 1) {
            examplesEl.style.display = 'none';
        }
    };
    
    window.spaiShowTyping = function() {
        const indicator = document.createElement('div');
        indicator.id = 'spai-typing-indicator';
        indicator.className = 'spai-message spai-assistant';
        indicator.innerHTML = `
            <div class="spai-avatar">AI</div>
            <div class="spai-typing spai-show">
                <div class="spai-typing-dot"></div>
                <div class="spai-typing-dot"></div>
                <div class="spai-typing-dot"></div>
            </div>
        `;
        messagesEl.appendChild(indicator);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    };
    
    window.spaiHideTyping = function() {
        const indicator = document.getElementById('spai-typing-indicator');
        if (indicator) indicator.remove();
    };
    
    window.spaiSendMessage = async function() {
        if (isProcessing) return;
        
        const message = inputEl.value.trim();
        if (!message) return;
        
        window.spaiAddMessage(message, true);
        inputEl.value = '';
        inputEl.style.height = 'auto';
        
        isProcessing = true;
        sendBtn.disabled = true;
        inputEl.disabled = true;
        
        window.spaiShowTyping();
        
        try {
            const response = await fetch(`${API_BASE_URL}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: message,
                    conversation_id: conversationId
                })
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'API request failed');
            }
            
            const data = await response.json();
            conversationId = data.conversation_id;
            
            window.spaiHideTyping();
            window.spaiAddMessage(data.response, false);
            
        } catch (error) {
            console.error('Error:', error);
            window.spaiHideTyping();
            window.spaiShowError(`Error: ${error.message}. Make sure the API server is running.`);
        } finally {
            isProcessing = false;
            sendBtn.disabled = false;
            inputEl.disabled = false;
            inputEl.focus();
        }
    };
    
    window.spaiClearConversation = function() {
        conversationId = null;
        messagesEl.innerHTML = `
            <div class="spai-message spai-assistant">
                <div class="spai-avatar">AI</div>
                <div class="spai-content">Hello! I can help you search, browse, and read files in SharePoint. What would you like to find?</div>
            </div>
        `;
        if (examplesEl) examplesEl.style.display = 'flex';
        inputEl.focus();
    };
    
    inputEl.focus();
})();
</script>
